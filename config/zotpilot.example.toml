# ZotPilot Configuration Example
# Actual config is stored as JSON at ~/.config/zotpilot/config.json
# This file is for documentation purposes.

[zotero]
data_dir = "~/Zotero"

[embeddings]
provider = "gemini"  # or "local"
model = "gemini-embedding-001"
dimensions = 768

[index]
chunk_size = 400
chunk_overlap = 100
chroma_db_path = "~/.local/share/zotpilot/chroma"

[reranking]
enabled = true
alpha = 0.7

[vision]
enabled = true
model = "claude-haiku-4-5-20251001"

[formula_ocr]
enabled = false
provider = "local"  # or "simpletex"
daily_call_budget = 0  # 0 means uncapped; use 1600-1800 for free daily SimpleTex backfills
low_confidence_threshold = 0.0  # e.g. 0.75 to return a manual review queue
